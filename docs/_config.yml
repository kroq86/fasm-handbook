title: FASM Handbook
description: FASM examples, handbook pages, and reference notes for x86_64 Linux.
url: https://kroq86.github.io
baseurl: /fasm-handbook
theme: minima
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
kramdown:
  input: GFM
header_pages:
  - en.md
  - ru.md
  - examples.md
  - repository-map.md
  - book-en.md
  - book-ru.md
  - reference-guide-full.md
  - ai-fasm-rules.md
defaults:
  - scope:
      path: ""
    values:
      layout: page
